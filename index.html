/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;}

/* ── PAGE / PRINT SETUP ── */
@page{size:A4 landscape;margin:6mm;}
@media print{
  html,body{width:297mm;height:210mm;overflow:hidden;}

/* ── TOOLBAR ── */
.toolbar{

}
.toolbar h1{font-size:13px;font-weight:800;letter-spacing:0.5px;}
.toolbar p{font-size:10px;color:#aaa;margin-top:2px;}
.toolbar-btns{display:flex;gap:8px;}

.btn-print{background:#f0a500;color:#111;}
.btn-refresh{background:#2e3250;color:#fff;border:1px solid #444;}

/* ── MAIN WRAPPER ── */
.wrapper{

/* ── PAGE HEADER ── */

}
.page-header .title{font-size:13px;font-weight:900;letter-spacing:0.5px;color:#1a1d2e;}
.page-header .date{font-size:10px;font-weight:600;color:#444;}

/* ── GRID SYSTEM ── */

.col{flex:1;display:flex;flex-direction:column;gap:3px;}

/* ── CARD ── */

.lbl{font-size:5.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:1px;}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:3px;}

.four-col{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:2px;}

.divider{height:1px;background:#e8eaf2;margin:2px 0;}

.br{background:#e8f8f2;color:#1e7a51;border:1px solid #b8e8d4;}
.bl{background:#e8eeff;color:#2d5bbf;border:1px solid #c0ccf0;}
.bn{background:#f0f2f5;color:#888;border:1px solid #dde;}

/* ── TABLES ── */
table{width:100%;border-collapse:collapse;}
th{

const SHEET_NAME = 'Dashboard';

function sheetUrl(){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&cachebust=${Date.now()}`;
}

function parseCsv(text){
  const rows=[];
  for(const line of text.split('\n')){
    const cells=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;continue;}
      if(c===','&&!inQ){cells.push(cur.trim());cur='';continue;}
      cur+=c;
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function safe(v){return(v==null?'':String(v).trim());}
function fmt(v){return safe(v)||'—';}

function badge(s){
  const sl=safe(s).toLowerCase();
  if(sl.includes('delivery hold')||sl.includes('hold'))return`<span class="badge bh">Hold</span>`;
  if(sl.includes('release'))return`<span class="badge bl">Release</span>`;
  if(sl.includes('ready'))return`<span class="badge br">Ready</span>`;
  if(!sl)return'';
  return`<span class="badge bn">${safe(s)}</span>`;
}

async function loadData(){
  document.getElementById('loader').style.display='flex';
  try{
    const res=await fetch(sheetUrl());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const text=await res.text();
    const rows=parseCsv(text);
    render(rows);
  }catch(e){
    console.error(e);
    renderStatic(); // fallback to PDF data
  }
  document.getElementById('loader').style.display='none';
}

function extractOrders(rows){
  const pending=[],delayed=[];
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    const joined=row.join('|');
    const daysM=joined.match(/(\d+)\s*Days/i);
    if(!daysM)continue;
    const days=daysM[1];
    const party=(row[0]||row[1]||'').replace(/"/g,'').trim();
    if(!party||party.length<3)continue;
    const amtCell=row.find(c=>/[\u09F3৳]/.test(c))||row.find(c=>/^\d[\d,]{3,}$/.test(c.trim()))||'';
    const statusCell=row[row.length-1]||'';
    const obj={party,days,amount:amtCell,status:statusCell};
    if(parseInt(days)<60)pending.push(obj);
    else delayed.push(obj);
  }
  return{pending:pending.slice(0,24),delayed:delayed.slice(0,24)};
}

function render(rows){
  // Use static PDF data for KPIs (sheet layout is complex dashboard, not plain table)
  // Order tables are extracted dynamically where possible
  const orders=extractOrders(rows);
  const now=new Date();
  document.getElementById('sub').textContent=`Live · ${SHEET_NAME} · ${now.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})}`;
  buildHTML(orders.pending.length?orders.pending:STATIC.pending,
            orders.delayed.length?orders.delayed:STATIC.delayed, now);
}

function renderStatic(){
  const now=new Date();
  document.getElementById('sub').textContent=`Cached data · ${now.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})} (could not connect)`;
  buildHTML(STATIC.pending,STATIC.delayed,now);
}
